<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monitor de Fraudes Bancárias</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #04080f;
      --panel: #090f1a;
      --border: #0d1f3c;
      --blue: #0047cc;
      --blue-light: #1a6bff;
      --accent: #00d4ff;
      --accent2: #ff3d5a;
      --text: #c8d8f0;
      --text-dim: #4a6080;
      --text-bright: #e8f4ff;
      --green: #00e676;
      --yellow: #ffd740;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid de fundo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,71,204,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,71,204,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(4, 8, 15, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .logo span {
      color: var(--text-dim);
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0, 230, 118, 0.08);
      border: 1px solid rgba(0, 230, 118, 0.2);
      border-radius: 4px;
      padding: 3px 10px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--green);
      letter-spacing: 0.1em;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    #clock {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-dim);
    }

    #countdown {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      background: rgba(0, 212, 255, 0.06);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 4px;
      padding: 3px 10px;
    }

    #total-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* FILTROS */
    .filters {
      position: relative;
      z-index: 10;
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: rgba(9, 15, 26, 0.8);
    }

    .filter-btn {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      padding: 4px 12px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: var(--blue-light);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--blue);
      border-color: var(--blue-light);
      color: #fff;
    }

    /* MAIN LAYOUT */
    .main {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 0;
      height: calc(100vh - 108px);
    }

    /* FEED */
    .feed {
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .feed::-webkit-scrollbar { width: 4px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* CARD */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
      animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: var(--blue-light);
      transform: translateX(3px);
    }

    .card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
    }

    .card.cat-0::before { background: #1a6bff; }
    .card.cat-1::before { background: #00d4ff; }
    .card.cat-2::before { background: #ff3d5a; }
    .card.cat-3::before { background: #ffd740; }
    .card.cat-4::before { background: #a855f7; }
    .card.cat-5::before { background: #ff6b35; }
    .card.cat-6::before { background: #00e676; }
    .card.cat-7::before { background: #ff3d5a; }
    .card.cat-8::before { background: #ffd740; }
    .card.cat-9::before { background: #00d4ff; }
    .card.cat-10::before { background: #a855f7; }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .cat-tag {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      padding: 2px 8px;
      border-radius: 2px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .cat-tag.cat-0 { background: rgba(26,107,255,0.15); color: #6699ff; }
    .cat-tag.cat-1 { background: rgba(0,212,255,0.12); color: #00d4ff; }
    .cat-tag.cat-2 { background: rgba(255,61,90,0.12); color: #ff3d5a; }
    .cat-tag.cat-3 { background: rgba(255,215,64,0.12); color: #ffd740; }
    .cat-tag.cat-4 { background: rgba(168,85,247,0.12); color: #c084fc; }
    .cat-tag.cat-5 { background: rgba(255,107,53,0.12); color: #ff9a6c; }
    .cat-tag.cat-6 { background: rgba(0,230,118,0.12); color: #00e676; }
    .cat-tag.cat-7 { background: rgba(255,61,90,0.12); color: #ff6b8a; }
    .cat-tag.cat-8 { background: rgba(255,215,64,0.12); color: #ffe082; }
    .cat-tag.cat-9 { background: rgba(0,212,255,0.12); color: #80e9ff; }
    .cat-tag.cat-10 { background: rgba(168,85,247,0.12); color: #d4a0ff; }

    .card-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-left: auto;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
      line-height: 1.5;
      margin-bottom: 6px;
      text-decoration: none;
      display: block;
    }

    .card-title:hover {
      color: var(--accent);
    }

    .card-source {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
    }

    /* SIDEBAR */
    .sidebar {
      border-left: 1px solid var(--border);
      background: var(--panel);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(13,31,60,0.5);
    }

    .stat-row:last-child { border-bottom: none; }

    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-bright);
    }

    .bar-wrap {
      margin-top: 4px;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.6s ease;
    }

    /* STATUS */
    #status-msg {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      padding: 8px 16px;
      text-align: center;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty-state .icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state p {
      font-family: var(--mono);
      font-size: 12px;
    }

    /* LOADING */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 40px;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 12px;
    }

    .loading-dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">FRAUD<span>//</span>MONITOR</div>
    <div class="live-badge">
      <div class="live-dot"></div>
      AO VIVO
    </div>
  </div>
  <div class="header-right">
    <span id="total-count">-- noticias</span>
    <span id="countdown">atualizando...</span>
    <span id="clock">--:--:--</span>
  </div>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-cat="all">TODAS</button>
</div>

<div class="main">
  <div class="feed" id="feed">
    <div class="loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      Carregando noticias...
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Por categoria</div>
      <div id="stats-list"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Status</div>
      <div id="status-msg">Aguardando...</div>
    </div>
  </div>
</div>

<script>
const CATEGORIAS = [
  { id: 0, nome: "FRAUDES BANCARIAS",       query: "fraude bancaria brasil banco" },
  { id: 1, nome: "GOLPES DIGITAIS E PIX",   query: "golpe pix fraude digital banco brasil" },
  { id: 2, nome: "OPERACOES POLICIAIS",     query: "operacao policia federal civil fraude bancaria crime financeiro brasil" },
  { id: 3, nome: "INVESTIGACOES",           query: "investigacao fraude financeira banco brasil ministerio publico" },
  { id: 4, nome: "NOVOS GOLPES",            query: "novo golpe bancario modalidade fraude banco brasil" },
  { id: 5, nome: "SEQUESTRO DE GERENTE",    query: "sequestro gerente banco brasil" },
  { id: 6, nome: "CRIMES CONTRA BANCOS",   query: "crime contra banco brasil roubo furto" },
  { id: 7, nome: "ASSALTO A BANCO",         query: "assalto roubo banco agencia bancaria brasil" },
  { id: 8, nome: "SAIDINHA BANCARIA",       query: "saidinha bancaria golpe brasil vitima" },
  { id: 9, nome: "EXPLOSAO DE AGENCIA",     query: "explosao agencia bancaria caixa eletronico brasil" },
  { id: 10, nome: "CANGACO DIGITAL",        query: "cangaco digital ataque banco sistema financeiro brasil" },
];

const CORES = [
  "#1a6bff","#00d4ff","#ff3d5a","#ffd740","#a855f7",
  "#ff6b35","#00e676","#ff3d5a","#ffd740","#00d4ff","#a855f7"
];

const PROXY = "https://api.rss2json.com/v1/api.json?rss_url=";

let todasNoticias = [];
let filtroAtivo = "all";
let countdownVal = 60;
let countdownTimer = null;

function limpar(txt) {
  return (txt || "")
    .replace(/[^\x20-\x7E\xC0-\xFF]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function timeAgo(dateStr) {
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 60000);
  if (diff < 1) return "agora";
  if (diff < 60) return `${diff}min`;
  const h = Math.floor(diff / 60);
  return `${h}h`;
}

async function buscarCategoria(cat) {
  const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(cat.query)}&hl=pt-BR&gl=BR&ceid=BR:pt-419`;
  const url = PROXY + encodeURIComponent(rssUrl);
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data.items) return [];
    const agora = Date.now();
    const limite = agora - 24 * 60 * 60 * 1000;
    return data.items
      .filter(item => new Date(item.pubDate).getTime() > limite)
      .slice(0, 5)
      .map(item => {
        const tituloRaw = limpar(item.title || "");
        const partes = tituloRaw.split(" - ");
        const fonte = partes.length > 1 ? partes.pop() : "";
        const titulo = partes.join(" - ");
        return {
          id: item.link,
          titulo,
          fonte,
          link: item.link,
          pubDate: item.pubDate,
          catId: cat.id,
          catNome: cat.nome,
        };
      });
  } catch (e) {
    return [];
  }
}

async function buscarTudo() {
  setStatus("Buscando noticias...");
  const resultados = await Promise.all(CATEGORIAS.map(buscarCategoria));
  
  // Junta e remove duplicatas por link
  const mapa = new Map();
  resultados.flat().forEach(n => {
    if (!mapa.has(n.id)) mapa.set(n.id, n);
  });

  // Ordena por data, mais recente primeiro
  todasNoticias = Array.from(mapa.values())
    .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

  renderFeed();
  renderStats();
  atualizarFiltros();
  setStatus(`Ultima atualizacao: ${new Date().toLocaleTimeString("pt-BR")}`);
  document.getElementById("total-count").textContent = `${todasNoticias.length} noticias`;
}

function renderFeed() {
  const feed = document.getElementById("feed");
  const lista = filtroAtivo === "all"
    ? todasNoticias
    : todasNoticias.filter(n => n.catId === parseInt(filtroAtivo));

  if (lista.length === 0) {
    feed.innerHTML = `
      <div class="empty-state">
        <div class="icon">[ ]</div>
        <p>Nenhuma noticia nas ultimas 24h</p>
      </div>`;
    return;
  }

  feed.innerHTML = lista.map(n => `
    <div class="card cat-${n.catId}">
      <div class="card-meta">
        <span class="cat-tag cat-${n.catId}">${n.catNome}</span>
        <span class="card-time">${timeAgo(n.pubDate)}</span>
      </div>
      <a class="card-title" href="${n.link}" target="_blank" rel="noopener">${n.titulo}</a>
      <div class="card-source">${n.fonte}</div>
    </div>
  `).join("");
}

function renderStats() {
  const list = document.getElementById("stats-list");
  const total = todasNoticias.length || 1;

  list.innerHTML = CATEGORIAS.map(cat => {
    const count = todasNoticias.filter(n => n.catId === cat.id).length;
    const pct = Math.round((count / total) * 100);
    return `
      <div class="stat-row">
        <div class="stat-label">
          <div class="stat-dot" style="background:${CORES[cat.id]}"></div>
          <span style="font-size:10px">${cat.nome}</span>
        </div>
        <span class="stat-value">${count}</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${pct}%;background:${CORES[cat.id]}"></div>
      </div>
    `;
  }).join("");
}

function atualizarFiltros() {
  const container = document.getElementById("filters");
  const botoes = CATEGORIAS.map(cat => {
    const count = todasNoticias.filter(n => n.catId === cat.id).length;
    return `<button class="filter-btn${filtroAtivo == cat.id ? ' active' : ''}" data-cat="${cat.id}">${cat.nome} (${count})</button>`;
  }).join("");

  container.innerHTML = `<button class="filter-btn${filtroAtivo === 'all' ? ' active' : ''}" data-cat="all">TODAS (${todasNoticias.length})</button>` + botoes;

  container.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      filtroAtivo = btn.dataset.cat;
      container.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderFeed();
    });
  });
}

function setStatus(msg) {
  document.getElementById("status-msg").textContent = msg;
}

function iniciarContagem() {
  countdownVal = 60;
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdownVal--;
    document.getElementById("countdown").textContent = `prox. em ${countdownVal}s`;
    if (countdownVal <= 0) {
      clearInterval(countdownTimer);
      buscarTudo().then(iniciarContagem);
    }
  }, 1000);
}

function atualizarRelogio() {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString("pt-BR");
}

// Inicia
buscarTudo().then(iniciarContagem);
setInterval(atualizarRelogio, 1000);
atualizarRelogio();
</script>
</body>
</html>
